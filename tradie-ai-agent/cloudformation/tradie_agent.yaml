AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Tradie Connect — Tradie-Facing Agent Infrastructure
  Fully CFN-managed: Lex V2 bot, fulfillment Lambda, Bedrock Agent,
  Bedrock Agent Alias, and all IAM roles.
  System prompt is read from SSM — deploy_tradie_agent.sh puts it there first.

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  CodeBucket:
    Type: String
    Description: S3 bucket containing Lambda zip files

  AgentActionLambdaArn:
    Type: String
    Description: ARN of the shared agent-actions Lambda (from tradie-connect-agent stack)

  TradieAgentInstruction:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /tradie-connect/dev/tradie-agent-instruction
    Description: >
      SSM parameter name holding the tradie agent system prompt.
      deploy_tradie_agent.sh stores the prompt here before deploying this template.

# ── Resources ──────────────────────────────────────────────────────────────────
Resources:

  # ── 1. Bedrock execution role for the tradie agent ─────────────────────────
  TradieBedrockAgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tradie-connect-tradie-bedrock-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: TradieBedrockAgentExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:GetInferenceProfile
                  - bedrock:ListInferenceProfiles
                Resource: "*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Ref AgentActionLambdaArn

  # ── 2. Bedrock Agent (fully CFN-managed) ───────────────────────────────────
  TradieBedrockAgent:
    Type: AWS::Bedrock::Agent
    DependsOn: TradieBedrockAgentExecutionRole
    Properties:
      AgentName: !Sub "TradieConnect-TradieAgent-${Env}"
      AgentResourceRoleArn: !GetAtt TradieBedrockAgentExecutionRole.Arn
      FoundationModel: "au.anthropic.claude-haiku-4-5-20251001-v1:0"
      Instruction: !Ref TradieAgentInstruction
      AutoPrepare: true
      IdleSessionTTLInSeconds: 600
      ActionGroups:
        - ActionGroupName: TradieManagement
          Description: "Tradie code auth, job reminders, job completion, and travel log"
          ActionGroupState: ENABLED
          ActionGroupExecutor:
            Lambda: !Ref AgentActionLambdaArn
          FunctionSchema:
            Functions:
              - Name: lookupTradieByCode
                Description: >
                  Authenticates a tradie by their 6-digit tradie code.
                  Always call this first. Returns phone_number which must be used
                  for all subsequent tool calls.
                Parameters:
                  tradieCode:
                    Type: string
                    Required: true
                    Description: "The 6-digit tradie code spoken by the caller e.g. 482719"

              - Name: getJobsByTradie
                Description: >
                  Returns jobs assigned to a tradie for a given date.
                  Use the phone_number returned by lookupTradieByCode as tradiePhone.
                Parameters:
                  tradiePhone:
                    Type: string
                    Required: true
                    Description: "Tradie phone number from lookupTradieByCode result e.g. +61411000001"
                  dateFilter:
                    Type: string
                    Required: true
                    Description: >
                      Date to filter by: today, tomorrow, day after tomorrow,
                      a weekday name e.g. monday, or ISO date YYYY-MM-DD

              - Name: completeJob
                Description: >
                  Marks a job as COMPLETED. Verifies job is assigned to the tradie.
                  Use phone_number from lookupTradieByCode as tradiePhone.
                Parameters:
                  jobId:
                    Type: string
                    Required: true
                    Description: "Job reference number e.g. JOB-20260424-A3F2B1"
                  tradiePhone:
                    Type: string
                    Required: true
                    Description: "Tradie phone number from lookupTradieByCode result — verifies job ownership"

              - Name: startTrip
                Description: >
                  Records the start of a tradie trip for the logbook.
                  Call after authentication. Returns trip_id used to end the trip later.
                Parameters:
                  tradiePhone:
                    Type: string
                    Required: true
                    Description: "Tradie phone number from lookupTradieByCode result"
                  tripType:
                    Type: string
                    Required: true
                    Description: "Type of trip: job (to/from a job site), supplier (to a trade supplier), home, or other"
                  destination:
                    Type: string
                    Required: true
                    Description: "Where the tradie is heading — address or supplier name e.g. Bunnings Warehouse Auburn"
                  relatedJobId:
                    Type: string
                    Required: false
                    Description: "Job ID if tripType is job e.g. JOB-20260429-A3F2B1. Leave blank for other trip types."

              - Name: endTrip
                Description: >
                  Records the end of a tradie trip and marks it completed in the logbook.
                Parameters:
                  tripId:
                    Type: string
                    Required: true
                    Description: "Trip reference number returned by startTrip e.g. TRIP-20260429-A3F2B1"
                  tradiePhone:
                    Type: string
                    Required: true
                    Description: "Tradie phone number from lookupTradieByCode result — verifies trip ownership"

              - Name: getTripLog
                Description: >
                  Returns all trips logged by a tradie for a given date.
                Parameters:
                  tradiePhone:
                    Type: string
                    Required: true
                    Description: "Tradie phone number from lookupTradieByCode result"
                  dateFilter:
                    Type: string
                    Required: true
                    Description: "Date to retrieve trips for: today, yesterday, tomorrow, or ISO date YYYY-MM-DD"

  # ── 3. Bedrock Agent Alias (live) ─────────────────────────────────────────
  TradieBedrockAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !GetAtt TradieBedrockAgent.AgentId
      AgentAliasName: live

  # ── 4. Lex fulfillment Lambda role ─────────────────────────────────────────
  TradieLexFulfillmentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tradie-connect-tradie-lex-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TradieLexFulfillmentPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource: !Sub
                  - "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/${AgentId}/${AliasId}"
                  - AgentId: !GetAtt TradieBedrockAgent.AgentId
                    AliasId: !GetAtt TradieBedrockAgentAlias.AgentAliasId

  # ── 5. Lex fulfillment Lambda ─────────────────────────────────────────────
  TradieLexFulfillmentLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "tradie-connect-tradie-lex-${Env}"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt TradieLexFulfillmentLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: lambda/lex_fulfillment.zip
      Environment:
        Variables:
          BEDROCK_AGENT_ID:       !GetAtt TradieBedrockAgent.AgentId
          BEDROCK_AGENT_ALIAS_ID: !GetAtt TradieBedrockAgentAlias.AgentAliasId
      Tags:
        - Key: Project
          Value: TradieConnect
        - Key: Env
          Value: !Ref Env

  # ── 6. Allow Lex to invoke the fulfillment Lambda ─────────────────────────
  TradieLexFulfillmentLambdaLexPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TradieLexFulfillmentLambda.Arn
      Action: lambda:InvokeFunction
      Principal: lexv2.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ── 7. Allow the tradie Bedrock agent to invoke the shared action Lambda ──
  TradieAgentActionLambdaBedrockPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AgentActionLambdaArn
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ── 8. IAM role for the Lex bot (Polly TTS synthesis) ────────────────────
  TradieLexBotRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tradie-connect-lex-bot-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lexv2.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: TradieLexBotPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: polly:SynthesizeSpeech
                Resource: "*"

  # ── 9. Lex V2 bot ─────────────────────────────────────────────────────────
  TradieLexBot:
    Type: AWS::Lex::Bot
    Properties:
      Name: !Sub "TradieConnect-TradieBot-${Env}"
      RoleArn: !GetAtt TradieLexBotRole.Arn
      DataPrivacy:
        ChildDirected: false
      IdleSessionTTLInSeconds: 300
      AutoBuildBotLocales: true
      BotLocales:
        - LocaleId: en_AU
          NluConfidenceThreshold: 0.40
          VoiceSettings:
            VoiceId: Olivia
            Engine: neural
          Intents:
            - Name: GreetingIntent
              SampleUtterances:
                - Utterance: hello
                - Utterance: hi
                - Utterance: hi there
                - Utterance: good morning
                - Utterance: good afternoon
                - Utterance: hey
              FulfillmentCodeHook:
                Enabled: true
            - Name: FallbackIntent
              ParentIntentSignature: AMAZON.FallbackIntent
              FulfillmentCodeHook:
                Enabled: true

  # ── 10. Bot version ────────────────────────────────────────────────────────
  TradieLexBotVersion:
    Type: AWS::Lex::BotVersion
    Properties:
      BotId: !Ref TradieLexBot
      BotVersionLocaleSpecification:
        - LocaleId: en_AU
          BotVersionLocaleDetails:
            SourceBotVersion: DRAFT

  # ── 11. Bot alias with Lambda fulfillment hook ────────────────────────────
  TradieLexBotAlias:
    Type: AWS::Lex::BotAlias
    Properties:
      BotId: !Ref TradieLexBot
      BotAliasName: live
      BotVersion: !GetAtt TradieLexBotVersion.BotVersion
      BotAliasLocaleSettings:
        - LocaleId: en_AU
          BotAliasLocaleSetting:
            Enabled: true
            CodeHookSpecification:
              LambdaCodeHook:
                LambdaArn: !GetAtt TradieLexFulfillmentLambda.Arn
                CodeHookInterfaceVersion: "1.0"

# ── Outputs ────────────────────────────────────────────────────────────────────
Outputs:

  TradieBedrockAgentId:
    Value: !GetAtt TradieBedrockAgent.AgentId
    Description: Tradie Bedrock Agent ID
    Export:
      Name: !Sub "TradieConnect-TradieAgentId-${Env}"

  TradieBedrockAgentAliasId:
    Value: !GetAtt TradieBedrockAgentAlias.AgentAliasId
    Description: Tradie Bedrock Agent Alias ID
    Export:
      Name: !Sub "TradieConnect-TradieAliasId-${Env}"

  TradieBedrockAgentExecutionRoleArn:
    Value: !GetAtt TradieBedrockAgentExecutionRole.Arn
    Description: Assigned to the tradie Bedrock Agent
    Export:
      Name: !Sub "TradieConnect-TradieBedockRole-${Env}"

  TradieLexFulfillmentLambdaArn:
    Value: !GetAtt TradieLexFulfillmentLambda.Arn
    Description: Tradie Lex fulfillment Lambda ARN
    Export:
      Name: !Sub "TradieConnect-TradieLexLambda-${Env}"

  TradieLexBotId:
    Value: !Ref TradieLexBot
    Description: Wire this bot ID into the Connect contact flow (Get customer input block)
    Export:
      Name: !Sub "TradieConnect-TradieBotId-${Env}"

  TradieLexBotAliasId:
    Value: !GetAtt TradieLexBotAlias.BotAliasId
    Description: Wire this alias ID into the Connect contact flow
    Export:
      Name: !Sub "TradieConnect-TradieBotAliasId-${Env}"
