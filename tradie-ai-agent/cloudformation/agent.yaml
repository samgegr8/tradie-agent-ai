AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Tradie Connect — Customer Agent Infrastructure
  Fully CFN-managed: JobsTable, TripsTable, shared actions Lambda, IAM roles,
  AWS::Bedrock::Agent, AWS::Bedrock::AgentAlias, customer Lex bot, and Lex Lambda.
  System prompt is read from SSM — deploy.sh puts it there first.
  Note: SMS notification (Twilio) is a future roadmap item — no SNS resources here.

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  CodeBucket:
    Type: String
    Description: S3 bucket containing Lambda zip files

  ConnectInstanceArn:
    Type: String
    Description: Full ARN of the Amazon Connect instance

  CustomerAgentInstruction:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /tradie-connect/dev/customer-agent-instruction
    Description: >
      SSM parameter name holding the customer agent system prompt.
      deploy.sh stores the prompt here before deploying this template.

# ── Conditions ─────────────────────────────────────────────────────────────────
Conditions:
  IsProd: !Equals [!Ref Env, prod]

# ── Resources ──────────────────────────────────────────────────────────────────
Resources:

  # ── 1. JobsTable ─────────────────────────────────────────────────────────────
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "JobsTable-${Env}"
      BillingMode: PAY_PER_REQUEST
      TableClass: !If [IsProd, STANDARD, STANDARD_INFREQUENT_ACCESS]

      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: status
          AttributeType: S

      KeySchema:
        - AttributeName: job_id
          KeyType: HASH

      GlobalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]

      SSESpecification:
        SSEEnabled: true

      Tags:
        - Key: Project
          Value: TradieConnect
        - Key: Env
          Value: !Ref Env

  # ── 2. TripsTable ────────────────────────────────────────────────────────────
  TripsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "TripsTable-${Env}"
      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: trip_id
          AttributeType: S
        - AttributeName: tradie_phone
          AttributeType: S
        - AttributeName: started_at
          AttributeType: S

      KeySchema:
        - AttributeName: trip_id
          KeyType: HASH

      GlobalSecondaryIndexes:
        - IndexName: TradiePhoneIndex
          KeySchema:
            - AttributeName: tradie_phone
              KeyType: HASH
            - AttributeName: started_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

      SSESpecification:
        SSEEnabled: true

      Tags:
        - Key: Project
          Value: TradieConnect
        - Key: Env
          Value: !Ref Env

  # ── 3. Lambda execution role ─────────────────────────────────────────────────
  AgentActionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tradie-connect-actions-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: AgentActionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # DynamoDB — JobsTable (read + write)
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt JobsTable.Arn
                  - !Sub "${JobsTable.Arn}/index/*"

              # DynamoDB — TradiesTable (read only)
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/TradiesTable-${Env}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/TradiesTable-${Env}/index/*"
                  # Note: SNS permissions intentionally omitted.
                  # Twilio SMS integration is a future roadmap item.

              # DynamoDB — TripsTable (read + write)
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt TripsTable.Arn
                  - !Sub "${TripsTable.Arn}/index/*"

  # ── 4. Agent action Lambda ───────────────────────────────────────────────────
  AgentActionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "tradie-connect-actions-${Env}"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt AgentActionLambdaRole.Arn
      Timeout: 30
      MemorySize: 256

      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: lambda/agent_actions.zip

      Environment:
        Variables:
          JOBS_TABLE:    !Ref JobsTable
          TRADIES_TABLE: !Sub "TradiesTable-${Env}"
          TRIPS_TABLE:   !Ref TripsTable
          ENV:           !Ref Env

      Tags:
        - Key: Project
          Value: TradieConnect
        - Key: Env
          Value: !Ref Env

  # ── 5. Bedrock Agent execution role ─────────────────────────────────────────
  BedrockAgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tradie-connect-customer-bedrock-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: BedrockAgentExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:GetInferenceProfile
                  - bedrock:ListInferenceProfiles
                Resource: "*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt AgentActionLambda.Arn

  # ── 6. Allow Bedrock to invoke the action Lambda ─────────────────────────────
  AgentActionLambdaBedrockPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AgentActionLambda.Arn
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ── 7. Customer Bedrock Agent (fully CFN-managed) ───────────────────────────
  CustomerBedrockAgent:
    Type: AWS::Bedrock::Agent
    DependsOn: BedrockAgentExecutionRole
    Properties:
      AgentName: !Sub "TradieConnect-CustomerAgent-${Env}"
      AgentResourceRoleArn: !GetAtt BedrockAgentExecutionRole.Arn
      FoundationModel: "au.anthropic.claude-haiku-4-5-20251001-v1:0"
      Instruction: !Ref CustomerAgentInstruction
      AutoPrepare: true
      IdleSessionTTLInSeconds: 600
      ActionGroups:
        - ActionGroupName: JobManagement
          Description: "Job card creation, tradie lookup, assignment, and notification logging"
          ActionGroupState: ENABLED
          ActionGroupExecutor:
            Lambda: !GetAtt AgentActionLambda.Arn
          FunctionSchema:
            Functions:
              - Name: createJobCard
                Description: >
                  Creates a new job card in DynamoDB with customer and job details.
                  Always call this first. problemDescription is pipe-delimited:
                  description|YYYY-MM-DD|time slot|urgency
                Parameters:
                  customerName:
                    Type: string
                    Required: true
                    Description: "Full name of the customer calling in."
                  callbackNumber:
                    Type: string
                    Required: true
                    Description: "Customer phone number for callback."
                  serviceType:
                    Type: string
                    Required: true
                    Description: "Type of trade required e.g. plumber, electrician, carpenter."
                  address:
                    Type: string
                    Required: true
                    Description: "Full street address including suburb, state and postcode."
                  problemDescription:
                    Type: string
                    Required: true
                    Description: >
                      Pipe-delimited: problem description|YYYY-MM-DD appointment date|time slot|urgency.
                      e.g. Leaking tap under kitchen sink|2026-04-25|morning|standard

              - Name: lookupAvailableTradie
                Description: >
                  Finds an available tradie matching the service type and suburb.
                  Call this after createJobCard.
                Parameters:
                  serviceType:
                    Type: string
                    Required: true
                    Description: "Trade type to match, must match what was passed to createJobCard."
                  suburb:
                    Type: string
                    Required: false
                    Description: "Suburb from the customer address, used to prefer a nearby tradie."

              - Name: assignTradieToJob
                Description: >
                  Assigns the matched tradie to the job card.
                  Call this after lookupAvailableTradie.
                Parameters:
                  jobId:
                    Type: string
                    Required: true
                    Description: "Job ID returned by createJobCard."
                  tradieId:
                    Type: string
                    Required: true
                    Description: "Tradie ID returned by lookupAvailableTradie."

              - Name: logJobNotification
                Description: >
                  Logs the notification intent for the assigned tradie.
                  Call this last, after assignTradieToJob.
                Parameters:
                  jobId:
                    Type: string
                    Required: true
                    Description: "Job ID of the assigned job."
                  tradiePhone:
                    Type: string
                    Required: true
                    Description: "Phone number of the assigned tradie."

  # ── 8. Customer Bedrock Agent Alias (live) ───────────────────────────────────
  CustomerBedrockAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !GetAtt CustomerBedrockAgent.AgentId
      AgentAliasName: live

  # ── 9. IAM role for the customer Lex bot (Polly TTS) ────────────────────────
  CustomerLexBotRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tradie-connect-customer-lex-bot-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lexv2.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: CustomerLexBotPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: polly:SynthesizeSpeech
                Resource: "*"

  # ── 10. Customer Lex V2 bot (CFN-managed, replaces manual TradieConnectBot) ──
  CustomerLexBot:
    Type: AWS::Lex::Bot
    Properties:
      Name: !Sub "TradieConnect-CustomerBot-${Env}"
      RoleArn: !GetAtt CustomerLexBotRole.Arn
      DataPrivacy:
        ChildDirected: false
      IdleSessionTTLInSeconds: 300
      AutoBuildBotLocales: true
      BotLocales:
        - LocaleId: en_AU
          NluConfidenceThreshold: 0.40
          VoiceSettings:
            VoiceId: Olivia
            Engine: neural
          Intents:
            - Name: GreetingIntent
              SampleUtterances:
                - Utterance: hello
                - Utterance: hi
                - Utterance: hi there
                - Utterance: good morning
                - Utterance: good afternoon
                - Utterance: hey
              FulfillmentCodeHook:
                Enabled: true
            - Name: FallbackIntent
              ParentIntentSignature: AMAZON.FallbackIntent
              FulfillmentCodeHook:
                Enabled: true

  # ── 11. Customer Lex bot version ─────────────────────────────────────────────
  CustomerLexBotVersion:
    Type: AWS::Lex::BotVersion
    Properties:
      BotId: !Ref CustomerLexBot
      BotVersionLocaleSpecification:
        - LocaleId: en_AU
          BotVersionLocaleDetails:
            SourceBotVersion: DRAFT

  # ── 12. Customer Lex bot alias with Lambda fulfillment hook ─────────────────
  CustomerLexBotAlias:
    Type: AWS::Lex::BotAlias
    Properties:
      BotId: !Ref CustomerLexBot
      BotAliasName: live
      BotVersion: !GetAtt CustomerLexBotVersion.BotVersion
      BotAliasLocaleSettings:
        - LocaleId: en_AU
          BotAliasLocaleSetting:
            Enabled: true
            CodeHookSpecification:
              LambdaCodeHook:
                LambdaArn: !GetAtt LexFulfillmentLambda.Arn
                CodeHookInterfaceVersion: "1.0"

  # ── 13. Lex fulfillment Lambda role ─────────────────────────────────────────
  LexFulfillmentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tradie-connect-customer-lex-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LexFulfillmentPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource: !Sub
                  - "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/${AgentId}/${AliasId}"
                  - AgentId: !GetAtt CustomerBedrockAgent.AgentId
                    AliasId: !GetAtt CustomerBedrockAgentAlias.AgentAliasId

  # ── 14. Customer Lex fulfillment Lambda ──────────────────────────────────────
  LexFulfillmentLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "tradie-connect-customer-lex-${Env}"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LexFulfillmentLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: lambda/lex_fulfillment.zip
      Environment:
        Variables:
          BEDROCK_AGENT_ID:       !GetAtt CustomerBedrockAgent.AgentId
          BEDROCK_AGENT_ALIAS_ID: !GetAtt CustomerBedrockAgentAlias.AgentAliasId
      Tags:
        - Key: Project
          Value: TradieConnect
        - Key: Env
          Value: !Ref Env

  # ── 15. Allow Lex to invoke the customer fulfillment Lambda ─────────────────
  LexFulfillmentLambdaLexPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LexFulfillmentLambda.Arn
      Action: lambda:InvokeFunction
      Principal: lexv2.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

# ── Outputs ────────────────────────────────────────────────────────────────────
Outputs:

  JobsTableName:
    Value: !Ref JobsTable
    Export:
      Name: !Sub "TradieConnect-JobsTable-${Env}"

  TripsTableName:
    Value: !Ref TripsTable
    Export:
      Name: !Sub "TradieConnect-TripsTable-${Env}"

  AgentActionLambdaArn:
    Value: !GetAtt AgentActionLambda.Arn
    Description: Shared actions Lambda ARN — used by both customer and tradie Bedrock Agents
    Export:
      Name: !Sub "TradieConnect-ActionsLambda-${Env}"

  CustomerBedrockAgentId:
    Value: !GetAtt CustomerBedrockAgent.AgentId
    Description: Customer Bedrock Agent ID
    Export:
      Name: !Sub "TradieConnect-CustomerAgentId-${Env}"

  CustomerBedrockAgentAliasId:
    Value: !GetAtt CustomerBedrockAgentAlias.AgentAliasId
    Description: Customer Bedrock Agent Alias ID
    Export:
      Name: !Sub "TradieConnect-CustomerAliasId-${Env}"

  BedrockAgentExecutionRoleArn:
    Value: !GetAtt BedrockAgentExecutionRole.Arn
    Export:
      Name: !Sub "TradieConnect-CustomerBedrockRole-${Env}"

  CustomerLexBotId:
    Value: !Ref CustomerLexBot
    Description: Wire this bot ID into the Connect customer contact flow
    Export:
      Name: !Sub "TradieConnect-CustomerBotId-${Env}"

  CustomerLexBotAliasId:
    Value: !GetAtt CustomerLexBotAlias.BotAliasId
    Description: Wire this alias ID into the Connect customer contact flow
    Export:
      Name: !Sub "TradieConnect-CustomerBotAliasId-${Env}"

  LexFulfillmentLambdaArn:
    Value: !GetAtt LexFulfillmentLambda.Arn
    Description: Customer Lex fulfillment Lambda ARN
    Export:
      Name: !Sub "TradieConnect-CustomerLexLambda-${Env}"
